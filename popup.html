<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Audio Mode</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <div class="top-nav">
            <button id="lang-btn" class="icon-btn text-btn" title="Language/لغة"
                style="font-family: 'Cairo', sans-serif; font-weight: 700;">
                ع
            </button>
            <div class="top-right-actions">

                <button id="support-btn" class="icon-btn" title="Support">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </button>
                <button id="settings-btn" class="icon-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z">
                        </path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <div class="header">
            <div class="header-info">
                <h1 data-i18n="appName">YouTube Audio Mode</h1>
                <p class="subtitle" data-i18n="appDesc">Save bandwidth, keep the audio</p>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="audioToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div id="settings-panel" class="settings-panel">
            <div class="settings-header">
                <h2 data-i18n="appearance">Appearance</h2>
                <button id="close-settings" class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="settings-content">
                <div class="setting-group">
                    <label data-i18n="backgroundType">Background Type</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-type="color" data-i18n="color">Color</button>
                        <button class="toggle-btn" data-type="image" data-i18n="image">Image</button>
                    </div>
                </div>

                <div id="color-options" class="setting-group">
                    <label data-i18n="presets">Presets</label>
                    <div class="theme-grid">
                        <button class="theme-btn" data-theme="default"
                            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"
                            title="Default"></button>
                        <button class="theme-btn" data-theme="sunset"
                            style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);"
                            title="Sunset"></button>
                        <button class="theme-btn" data-theme="ocean"
                            style="background: linear-gradient(135deg, #0ba360 0%, #3cba92 100%);"
                            title="Ocean"></button>
                        <button class="theme-btn" data-theme="midnight"
                            style="background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);"
                            title="Midnight"></button>
                        <button class="theme-btn" data-theme="fire"
                            style="background: linear-gradient(135deg, #f83600 0%, #fe8c00 100%);"
                            title="Fire"></button>
                        <button class="theme-btn" data-theme="minimal" style="background: #222;"
                            title="Minimal Dark"></button>
                    </div>

                    <label style="margin-top: 12px; display: block;" data-i18n="customColor">Custom Color</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="custom-color-picker" value="#667eea">
                        <span id="color-value-text">#667eea</span>
                    </div>
                </div>

                <div id="image-options" class="setting-group hidden">
                    <label data-i18n="imageUrl">Image URL</label>
                    <div class="input-group">
                        <input type="text" id="custom-image-url" placeholder="https://example.com/image.jpg">
                        <button id="apply-image-btn" data-i18n="apply">Apply</button>
                    </div>
                    <p class="hint" data-i18n="imageHint">Paste a direct link to an image.</p>
                </div>
            </div>
        </div>

        <div class="content">
            <!-- Playback Speed Control removed from here -->

            <!-- Music Player Interface -->
            <div class="music-player-container hidden" id="musicPlayer">
                <!-- Col 1: Art -->
                <div class="player-col-art">
                    <div class="am-album-art">
                        <img src="" alt="Thumbnail" id="am-thumbnail-img" class="hidden">
                        <div class="placeholder-art" id="am-placeholder-art">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"
                                    fill="currentColor" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Col 2: Info & Timeline -->
                <div class="player-col-main">
                    <div class="track-info">
                        <div class="title-scroll-wrapper">
                            <h2 id="am-video-title" data-i18n="noVideo">No Video Playing</h2>
                        </div>
                        <p id="am-channel-name">YouTube</p>
                    </div>

                    <div class="timeline-container" dir="ltr">
                        <span id="am-current-time">0:00</span>
                        <div class="progress-bar-wrapper">
                            <input type="range" class="am-progress-bar" id="am-progress-bar" min="0" max="100" value="0"
                                step="0.1" disabled>
                            <div class="progress-fill" id="am-progress-fill" style="width: 0%"></div>
                        </div>
                        <span id="am-total-time">0:00</span>
                    </div>
                </div>

                <!-- Col 3: Controls -->
                <div class="player-col-controls">
                    <div class="control-group-main">
                        <button id="am-jump-back" class="control-btn small" title="Rewind 10s">
                            <svg viewBox="0 0 24 24">
                                <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z" />
                            </svg>
                        </button>

                        <button id="am-play-pause-btn" class="control-btn" title="Play/Pause" disabled>
                            <svg viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </button>

                        <button id="am-jump-forward" class="control-btn small" title="Forward 10s">
                            <svg viewBox="0 0 24 24">
                                <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
                            </svg>
                        </button>
                    </div>

                    <div class="speed-dropdown-wrapper">
                        <select id="speed-select" title="Playback Speed">
                            <option value="0.25">0.25x</option>
                            <option value="0.5">0.5x</option>
                            <option value="0.75">0.75x</option>
                            <option value="1" selected>1x</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                            <option value="1.75">1.75x</option>
                            <option value="2">2x</option>
                        </select>
                        <select id="volume-select" title="Volume">
                            <option value="0">🔇</option>
                            <option value="0.25">🔊 25%</option>
                            <option value="0.5">🔊 50%</option>
                            <option value="0.75">🔊 75%</option>
                            <option value="1" selected>🔊 100%</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="shortcuts-hint">
                <span data-i18n="shortcut">Shortcut(click to change):</span>
                <div class="keys" id="shortcut-display">
                    <!-- Configured via JS -->
                    <span class="loading">Loading...</span>
                </div>
            </div>

            <div class="stats-header-row">
                <div class="stats-toggle">
                    <button class="stats-filter active" data-filter="month" data-i18n="thisMonth">This Month</button>
                    <button class="stats-filter" data-filter="all" data-i18n="allTime">All Time</button>
                </div>
            </div>

            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon">📡</div>
                    <div class="stat-content">
                        <div class="stat-value" id="data-used-value">0 MB</div>
                        <div class="stat-label" data-i18n="usedData">Data Used</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-content">
                        <div class="stat-value" id="data-saved-value">0 MB</div>
                        <div class="stat-label" data-i18n="savedData">Saved vs 720p</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎧</div>
                    <div class="stat-content">
                        <div class="stat-value" id="listened-time-value">0m</div>
                        <div class="stat-label" data-i18n="listenedTime">Listened</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-content">
                        <div class="stat-value" id="active-time-value">0m</div>
                        <div class="stat-label" data-i18n="activeTime">Active</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="https://github.com/devahmedadli" target="_blank" rel="noopener noreferrer">
                <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                    </path>
                </svg>
                <span data-i18n="developedBy">Developed by Ahmed Adli</span>
            </a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
